services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_EXPERIMENTAL_ENABLE_VECTOR_STORE: "true"
    volumes:
      - ./data:/meili_data
